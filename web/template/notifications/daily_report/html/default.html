<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; margin: 20px; color: #222; }
    h1 { font-size: 20px; margin-bottom: 12px; }
    h2 { font-size: 16px; margin: 16px 0 8px; }
    ul { margin: 0 0 8px 20px; }
    li { line-height: 1.6; }
    .timestamp { color: #666; font-size: 12px; }
  </style>
  </head>
<body>
  <h1>{{ title }}</h1>
  {% if timestamp %}<div class="timestamp">时间：{{ timestamp }}</div>{% endif %}

  {% for sec in sections %}
    <h2>• {{ sec.section_title }}</h2>
    <ul>
      {% for line in sec['items'] %}
      <li>{{ line }}</li>
      {% endfor %}
    </ul>
  {% endfor %}

  {% if not sections %}
    <p>暂无内容</p>
  {% endif %}
</body>

</html>
