name: Auto Merge Release PR

on:
  pull_request:
    branches: [main]
    types: [opened, labeled, unlabeled, synchronize, ready_for_review, edited, reopened, unlocked]
  pull_request_target:
    types: [opened, labeled, synchronize, ready_for_review]
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  status: {}
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Automerge (PR context)
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: 'autorelease: pending'
          UPDATE_LABELS: 'autorelease: pending'
          MERGE_DELETE_BRANCH: 'true'
          LOG: 'DEBUG'
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_RETRIES: 10
          MERGE_RETRY_SLEEP: 30000
          BASE_BRANCHES: 'main'
          PULL_REQUEST: ${{ github.event.pull_request.number }}

      - name: Automerge (issues labeled)
        if: ${{ github.event_name == 'issues' && github.event.issue.pull_request != null }}
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: 'autorelease: pending'
          UPDATE_LABELS: 'autorelease: pending'
          MERGE_DELETE_BRANCH: 'true'
          LOG: 'DEBUG'
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_RETRIES: 10
          MERGE_RETRY_SLEEP: 30000
          BASE_BRANCHES: 'main'
          PULL_REQUEST: ${{ github.event.issue.number }}

      - name: Automerge (fallback after Release)
        if: ${{ github.event_name == 'workflow_run' || github.event_name == 'check_suite' || github.event_name == 'status' }}
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: 'autorelease: pending'
          UPDATE_LABELS: 'autorelease: pending'
          MERGE_DELETE_BRANCH: 'true'
          LOG: 'DEBUG'
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_RETRIES: 10
          MERGE_RETRY_SLEEP: 30000
          BASE_BRANCHES: 'main'

      - name: Automerge (github-script polling)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const component = 'snowball-lite';
            const headPrefix = 'release-please--branches--';
            const baseBranches = ['main'];
            const requiredLabel = 'autorelease: pending';
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            let target = null;
            for (let attempt = 0; attempt < 6; attempt++) {
              const prs = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 });
              const candidates = prs.filter(pr => baseBranches.includes(pr.base.ref)
                && pr.head.ref.startsWith(headPrefix)
                && pr.head.ref.includes(`--components--${component}`));
              if (candidates.length === 0) {
                core.info(`No candidates found (attempt ${attempt + 1}), waiting 30s...`);
                await sleep(30000);
                continue;
              }
              // Prefer most recently updated
              target = candidates.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
              const labels = (target.labels || []).map(l => l.name);
              if (!labels.includes(requiredLabel)) {
                core.info(`PR #${target.number} lacks required label '${requiredLabel}', waiting 30s...`);
                await sleep(30000);
                continue;
              }
              break;
            }

            if (!target) {
              core.info('No release-please PR matched after polling; exiting.');
              return;
            }

            await github.rest.pulls.merge({ owner, repo, pull_number: target.number, merge_method: 'squash' });
            core.info(`Merged release PR #${target.number}`);
