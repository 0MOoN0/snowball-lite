[pytest]
markers =
    local: marks tests as local tests (deselect with '-m "not local"')
    manual: marks tests as manual tests that should not run automatically
    integration: marks tests as integration tests
    analysis: marks tests as analysis service tests
    grid: marks tests as grid-related tests

filterwarnings =
    ignore::DeprecationWarning:flask_restx.*
    ignore::DeprecationWarning:marshmallow.*
    ignore::DeprecationWarning:flask_marshmallow.*
    ignore:jsonschema.RefResolver is deprecated:DeprecationWarning
    ignore:distutils Version classes are deprecated:DeprecationWarning
    ignore::sqlalchemy.exc.RemovedIn20Warning
    ignore:Deprecated API features detected:sqlalchemy.exc.RemovedIn20Warning
