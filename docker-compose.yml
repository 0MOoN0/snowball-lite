services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: snowball-lite-backend
    restart: unless-stopped
    mem_limit: ${BACKEND_MEM_LIMIT:-512m}
    environment:
      TZ: Asia/Shanghai
      SNOW_APP_STATUS: lite
      LITE_FLASK_PORT: "5001"
      LITE_DB_PATH: /app/apps/backend/web/data/lite_runtime/snowball_lite.db
      LITE_SCHEDULER_DB_PATH: /app/apps/backend/web/data/lite_runtime/scheduler/snowball_lite_scheduler.db
      LITE_XALPHA_CACHE_BACKEND: sql
      LITE_ENABLE_XALPHA_SQL_CACHE: "true"
      LITE_XALPHA_CACHE_SQLITE_PATH: /app/apps/backend/web/data/lite_runtime/lite_xalpha_cache/lite_xalpha_cache.db
      pushplus: ${pushplus:-}
      telegram_bot: ${telegram_bot:-}
      chat_id: ${chat_id:-}
    ports:
      - "5001:5001"
    volumes:
      - backend_runtime:/app/apps/backend/web/data/lite_runtime
      - backend_logs:/app/apps/backend/weblogs
    command: ["gunicorn", "-c", "web/gunicorn_lite.config.py", "web.lite_application:app"]

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        PNPM_VERSION: 10.28.2
        VITE_BUILD_MODE: lite
        VITE_SOURCEMAP: "false"
        NODE_OPTIONS: ${FRONTEND_BUILD_NODE_OPTIONS:---max-old-space-size=1536}
    container_name: snowball-lite-frontend
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-128m}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_runtime:
  backend_logs:
